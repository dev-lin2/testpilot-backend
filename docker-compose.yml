version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: testpilot_postgres
    environment:
      POSTGRES_USER: testpilot
      POSTGRES_PASSWORD: testpilot
      POSTGRES_DB: testpilot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testpilot_network

  redis:
    image: redis:7-alpine
    container_name: testpilot_redis
    ports:
      - '6379:6379'
    networks:
      - testpilot_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: testpilot_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@testpilot.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - testpilot_network

volumes:
  postgres_data:

networks:
  testpilot_network:
    driver: bridge
